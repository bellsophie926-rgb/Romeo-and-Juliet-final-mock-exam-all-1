        // 生成随机学生ID
        function generateStudentId() {
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
            let id = '';
            for (let i = 0; i &lt; 6; i++) {
                id += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            return id;
        }

                            if (isAnswered) {
                                classes += ' disabled';
                                if (idx === answer.selected) {
                                    classes += answer.correct ? ' correct font-bold shadow-md' : ' incorrect';
                                }
                                if (idx === q.correct &amp;&amp; !answer.correct) {
                                    classes += ' correct font-bold shadow-md';
                                }
                            }
                            return `
                                &lt;div class=&quot;${classes}&quot; onclick=&quot;app.selectAnswer(${idx})&quot;&gt;
                                    &lt;div class=&quot;flex items-start justify-between gap-4&quot;&gt;
                                        &lt;span&gt;${opt}&lt;/span&gt;
                                        ${isAnswered &amp;&amp; idx === answer.selected ? 
                                            (answer.correct ? '&lt;span class=&quot;text-3xl text-correct leading-none&quot;&gt;✓&lt;/span&gt;' : '&lt;span class=&quot;text-3xl text-incorrect leading-none&quot;&gt;✗&lt;/span&gt;') : ''}
                                        ${isAnswered &amp;&amp; idx === q.correct &amp;&amp; !answer.correct ? '&lt;span class=&quot;text-3xl text-correct leading-none&quot;&gt;✓&lt;/span&gt;' : ''}
                                    &lt;/div&gt;
                                &lt;/div&gt;
                            `;
                        }).join('')}
                    &lt;/div&gt;

                    ${isAnswered ? `
                        &lt;div class=&quot;bg-${answer.correct ? 'green' : 'red'}-50 border-l-8 border-${answer.correct ? 'correct' : 'incorrect'} p-6 rounded-r-xl mt-8 animate-[fadeIn_0.4s_ease-out] shadow-inner&quot;&gt;
                            &lt;h4 class=&quot;font-black text-xl mb-3 flex items-center gap-2 text-${answer.correct ? 'green' : 'red'}-800&quot;&gt;
                                ${answer.correct ? '&lt;span&gt;🌟&lt;/span&gt; Excellent!' : '&lt;span&gt;💡&lt;/span&gt; Let\'s Review'}
                            &lt;/h4&gt;
                            &lt;p class=&quot;text-gray-800 text-base md:text-lg leading-relaxed&quot;&gt;${q.explanation}&lt;/p&gt;
                        &lt;/div&gt;
                    ` : ''}
                `;

                app.updateProgress();

                document.getElementById('btn-prev').disabled = app.currentQuestion === 0;
                document.getElementById('btn-next').textContent = 
                    app.currentQuestion === quizData.length - 1 ? 'Submit Exam 🏁' : 'Next Question &rarr;';
                
                if (app.currentQuestion === quizData.length - 1) {
                    document.getElementById('btn-next').classList.replace('bg-primary', 'bg-secondary');
                } else {
                    document.getElementById('btn-next').classList.replace('bg-secondary', 'bg-primary');
                }
            },

            selectAnswer: (idx) =&gt; {
                const answer = app.answers[app.currentQuestion];
                if (answer.selected !== null) return; 

                const q = quizData[app.currentQuestion];
                answer.selected = idx;
                answer.correct = idx === q.correct;

                app.renderQuestion();
            },

            updateProgress: () =&gt; {
                const answered = app.answers.filter(a =&gt; a.selected !== null).length;
                const percentage = (answered / quizData.length) * 100;

                document.getElementById('progress-bar').style.width = percentage + '%';
                document.getElementById('progress-text').textContent = `${answered}/${quizData.length}`;
            },

            nextQuestion: () =&gt; {
                if (app.currentQuestion &lt; quizData.length - 1) {
                    app.currentQuestion++;
                    app.renderQuestion();
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                } else {
                    // 检查是否全部答完
                    const unanswered = app.answers.findIndex(a =&gt; a.selected === null);
                    if (unanswered !== -1) {
                        alert(`Please answer question ${unanswered + 1} before submitting.`);
                        app.currentQuestion = unanswered;
                        app.renderQuestion();
                        window.scrollTo({ top: 0, behavior: 'smooth' });
                        return;
                    }
                    app.finishQuiz();
                }
            },

            prevQuestion: () =&gt; {
                if (app.currentQuestion &gt; 0) {
                    app.currentQuestion--;
                    app.renderQuestion();
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                }
            },

            finishQuiz: () =&gt; {
                app.endTime = new Date().toISOString();
                const correct = app.answers.filter(a =&gt; a.correct).length;
                const total = quizData.length;
                const percentage = Math.round((correct / total) * 100);

                document.getElementById('quiz-screen').classList.add('hidden');
                document.getElementById('result-screen').classList.remove('hidden');

                document.getElementById('student-id-display').textContent = app.studentId;
                
                // 动画显示分数
                let currentScore = 0;
                const scoreElement = document.getElementById('final-score');
                const timer = setInterval(() =&gt; {
                    if (currentScore &gt;= percentage) {
                        clearInterval(timer);
                        scoreElement.textContent = percentage + '%';
                    } else {
                        currentScore++;
                        scoreElement.textContent = currentScore + '%';
                    }
                }, 20);

                // 圆环动画
                setTimeout(() =&gt; {
                    const circle = document.getElementById('score-circle');
                    const offset = 553 - (553 * percentage) / 100;
                    circle.style.strokeDashoffset = offset;
                    if (percentage &lt; 60) circle.style.stroke = '#E74C3C';
                    else if (percentage &lt; 80) circle.style.stroke = '#F39C12';
                }, 100);

                document.getElementById('correct-count').textContent = correct;
                document.getElementById('incorrect-count').textContent = total - correct;
                document.getElementById('total-count').textContent = total;

                let message = '';
                if (percentage &gt;= 90) message = 'Exceptional! You are ready for the real exam! 🏆';
                else if (percentage &gt;= 80) message = 'Great job! Solid understanding of the material. 🌟';
                else if (percentage &gt;= 70) message = 'Good effort! Review your mistakes to improve. 📚';
                else if (percentage &gt;= 60) message = 'Passing, but you need to study the guide more closely. 📖';
                else message = 'Please review the study guide thoroughly and try again. 💪';
                document.getElementById('final-message').textContent = message;

                // 生成提交代码
                const submission = {
                    studentId: app.studentId,
                    startTime: app.startTime,
                    endTime: app.endTime,
                    answers: app.answers.map(a =&gt; ({ s: a.selected, c: a.correct })),
                    score: { correct, total, percentage }
                };
                const code = btoa(JSON.stringify(submission));
                document.getElementById('submission-code').textContent = code;

                window.scrollTo(0, 0);
            },

            copyCode: () =&gt; {
                const code = document.getElementById('submission-code').textContent;
                navigator.clipboard.writeText(code).then(() =&gt; {
                    alert('Code copied successfully! Please send it to your teacher.');
                });
            },

            reviewAnswers: () =&gt; {
                document.getElementById('result-screen').classList.add('hidden');
                document.getElementById('quiz-screen').classList.remove('hidden');
                app.currentQuestion = 0;
                app.renderQuestion();
            },

            decodeSubmission: () =&gt; {
                const code = document.getElementById('teacher-code-input').value.trim();
                if (!code) {
                    alert('Please paste a student code!');
                    return;
                }

                try {
                    const submission = JSON.parse(atob(code));
                    app.renderTeacherReport(submission);
                } catch (e) {
                    alert('Invalid code format! Please check and try again.');
                }
            },

            renderTeacherReport: (submission) =&gt; {
                const { studentId, startTime, endTime, answers, score } = submission;
                const duration = Math.round((new Date(endTime) - new Date(startTime)) / 60000);

                const resultsDiv = document.getElementById('teacher-results');
                resultsDiv.classList.remove('hidden');

                let scoreColor = score.percentage &gt;= 80 ? 'text-green-400' : (score.percentage &gt;= 60 ? 'text-yellow-400' : 'text-red-400');

                let html = `
                    &lt;div class=&quot;bg-primary text-white p-8 rounded-2xl shadow-xl&quot;&gt;
                        &lt;h3 class=&quot;text-3xl font-black mb-6 border-b border-white/20 pb-4 flex items-center gap-3&quot;&gt;
                            &lt;span&gt;📊&lt;/span&gt; Official Student Report
                        &lt;/h3&gt;
                        &lt;div class=&quot;grid grid-cols-2 md:grid-cols-4 gap-6&quot;&gt;
                            &lt;div class=&quot;bg-white/10 p-4 rounded-xl&quot;&gt;
                                &lt;div class=&quot;text-gray-300 text-sm uppercase tracking-wider font-bold mb-1&quot;&gt;Student ID&lt;/div&gt;
                                &lt;div class=&quot;font-mono font-black text-2xl&quot;&gt;${studentId}&lt;/div&gt;
                            &lt;/div&gt;
                            &lt;div class=&quot;bg-white/10 p-4 rounded-xl&quot;&gt;
                                &lt;div class=&quot;text-gray-300 text-sm uppercase tracking-wider font-bold mb-1&quot;&gt;Final Score&lt;/div&gt;
                                &lt;div class=&quot;font-black text-2xl ${scoreColor}&quot;&gt;${score.percentage}% &lt;span class=&quot;text-lg text-white font-normal&quot;&gt;(${score.correct}/${score.total})&lt;/span&gt;&lt;/div&gt;
                            &lt;/div&gt;
                            &lt;div class=&quot;bg-white/10 p-4 rounded-xl&quot;&gt;
                                &lt;div class=&quot;text-gray-300 text-sm uppercase tracking-wider font-bold mb-1&quot;&gt;Date Taken&lt;/div&gt;
                                &lt;div class=&quot;font-bold text-lg&quot;&gt;${new Date(startTime).toLocaleDateString()}&lt;/div&gt;
                            &lt;/div&gt;
                            &lt;div class=&quot;bg-white/10 p-4 rounded-xl&quot;&gt;
                                &lt;div class=&quot;text-gray-300 text-sm uppercase tracking-wider font-bold mb-1&quot;&gt;Time Spent&lt;/div&gt;
                                &lt;div class=&quot;font-bold text-lg&quot;&gt;~${duration} mins&lt;/div&gt;
                            &lt;/div&gt;
                        &lt;/div&gt;
                    &lt;/div&gt;

                    &lt;div class=&quot;mt-10&quot;&gt;
                        &lt;h3 class=&quot;text-2xl font-black mb-6 text-primary flex items-center gap-2&quot;&gt;
                            &lt;span&gt;🔍&lt;/span&gt; Incorrect Answers Analysis
                        &lt;/h3&gt;
                        &lt;div class=&quot;space-y-6&quot;&gt;
                `;

                let hasErrors = false;
                answers.forEach((ans, idx) =&gt; {
                    if (!ans.c &amp;&amp; ans.s !== null) { 
                        hasErrors = true;
                        const q = quizData[idx];
                        html += `
                            &lt;div class=&quot;border-2 border-red-100 rounded-2xl p-6 bg-white shadow-md hover:shadow-lg transition-shadow&quot;&gt;
                                &lt;div class=&quot;flex items-center gap-3 mb-4&quot;&gt;
                                    &lt;span class=&quot;bg-red-500 text-white text-sm font-black px-3 py-1 rounded-lg shadow-sm&quot;&gt;Q${q.id}&lt;/span&gt;
                                    &lt;span class=&quot;text-sm text-gray-500 font-bold uppercase tracking-wider&quot;&gt;${q.part}&lt;/span&gt;
                                &lt;/div&gt;
                                &lt;p class=&quot;text-gray-800 font-bold text-lg mb-5 leading-relaxed&quot;&gt;${q.question}&lt;/p&gt;
                                
                                &lt;div class=&quot;grid grid-cols-1 md:grid-cols-2 gap-6 text-base&quot;&gt;
                                    &lt;div class=&quot;bg-red-50 p-4 rounded-xl border border-red-200&quot;&gt;
                                        &lt;div class=&quot;text-red-800 font-black mb-2 uppercase tracking-wide text-sm&quot;&gt;Student Selected:&lt;/div&gt;
                                        &lt;div class=&quot;text-gray-800 font-medium&quot;&gt;${q.options[ans.s]}&lt;/div&gt;
                                    &lt;/div&gt;
                                    &lt;div class=&quot;bg-green-50 p-4 rounded-xl border border-green-200&quot;&gt;
                                        &lt;div class=&quot;text-green-800 font-black mb-2 uppercase tracking-wide text-sm&quot;&gt;Correct Answer:&lt;/div&gt;
                                        &lt;div class=&quot;text-gray-800 font-medium&quot;&gt;${q.options[q.correct]}&lt;/div&gt;
                                    &lt;/div&gt;
                                &lt;/div&gt;
                                &lt;div class=&quot;mt-5 text-base text-gray-700 bg-gray-50 p-4 rounded-xl border border-gray-200&quot;&gt;
                                    ${q.explanation}
                                &lt;/div&gt;
                            &lt;/div&gt;
                        `;
                    }
                });

                if (!hasErrors) {
                    html += `
                        &lt;div class=&quot;p-8 bg-green-50 border-2 border-green-200 text-green-800 rounded-2xl text-center shadow-sm&quot;&gt;
                            &lt;div class=&quot;text-6xl mb-4&quot;&gt;🏆&lt;/div&gt;
                            &lt;h4 class=&quot;text-2xl font-black mb-2&quot;&gt;Perfect Score!&lt;/h4&gt;
                            &lt;p class=&quot;text-lg&quot;&gt;This student answered all 60 questions correctly.&lt;/p&gt;
                        &lt;/div&gt;
                    `;
                }

                html += `
                        &lt;/div&gt;
                    &lt;/div&gt;
                `;
                resultsDiv.innerHTML = html;
            }
        };

        // 初始化
        window.onload = () =&gt; {
            app.showMode('student');
        };
    &lt;/script&gt;

  <script>

    function getIsMobile() {
      const width = document.documentElement.clientWidth
      const isMobile = /Android|webOS|iPhone|iPod|BlackBerry|iPad|Windows Phone|Mobile/i.test(navigator.userAgent) || width <= 768
      return isMobile
    }

    // 打开飞象老师官网
    function openFeixiangTeacher(event) {
      const isMobile = getIsMobile()

      // 判断是否为移动端浏览器
      if (isMobile) {
        // 移动端不跳转
        return
      }
      window.open('https://www.feixianglaoshi.com', '_blank')
    }


    // ==================== 埋点相关代码 ====================

    /**
     * 页面停留时长统计
     */
    (function () {
      let startTime = null
      let totalTime = 0
      let reportTimer = null // 防抖定时器

      // 开始计时
      function startTimer() {
        if (!startTime) {
          startTime = Date.now()
          console.log('[埋点] 开始计时')
        }
      }

      // 停止计时并累加时长
      function stopTimer() {
        if (startTime) {
          totalTime += Date.now() - startTime
          startTime = null
          console.log('[埋点] 停止计时，累计时长:', Math.floor(totalTime / 1000), '秒')
        }
      }

      // 检查页面是否真正可见
      function isPageVisible() {
        // 检查 document.hidden
        if (document.hidden) {
          return false
        }

        // 检查 document.visibilityState
        if (document.visibilityState && document.visibilityState !== 'visible') {
          return false
        }

        // 检查窗口是否有焦点
        if (!document.hasFocus()) {
          return false
        }

        return true
      }

      // 上报停留时长（带防抖）
      function reportStayTime(eventType, immediate = false) {
        stopTimer()

        // 清除之前的定时器
        if (reportTimer) {
          clearTimeout(reportTimer)
          reportTimer = null
        }

        // 如果是立即上报（如页面卸载），不使用防抖
        if (immediate) {
          doReport(eventType)
          return
        }

        // 使用防抖，避免短时间内多次上报
        // 100ms 内如果有多个事件触发，只上报最后一次
        reportTimer = setTimeout(function () {
          doReport(eventType)
          reportTimer = null
        }, 100)
      }

      // 实际执行上报
      function doReport(eventType) {
        if (window.frog && totalTime > 0) {
          const serverData = window.__SERVER_DATA__ || {}
          const chatId = serverData.watermarkChatId
          window.frog.add({
            url: '/time/HtmlPage/enter',
            eventId: 42818,
            customExtend: {
              chat_id: chatId,
              use_time: Math.floor(totalTime / 1000), // 转换为秒
            },
            duration: Math.floor(totalTime / 1000), // 转换为秒,
            currentPage: 'HtmlPage',
            eventAction: 'time',
            eventName: 'enter'
          })
          console.log(`[埋点] 页面停留时长上报 (${eventType}):`, Math.floor(totalTime / 1000), '秒')

          // 上报后重置累计时长，为下次统计做准备
          totalTime = 0
        }
      }

      // 清理函数：移除所有事件监听器
      function cleanup() {
        console.log('[埋点] 清理计时器资源')

        // 清除防抖定时器
        if (reportTimer) {
          clearTimeout(reportTimer)
          reportTimer = null
        }

        // 移除事件监听器
        document.removeEventListener('visibilitychange', handleVisibilityChange)
        window.removeEventListener('blur', handleBlur)
        window.removeEventListener('focus', handleFocus)
        window.removeEventListener('beforeunload', handleBeforeUnload)
        window.removeEventListener('pagehide', handlePageHide)

        // 重置变量
        startTime = null
        totalTime = 0
      }

      // 事件处理函数（需要命名以便移除）
      function handleVisibilityChange() {
        if (document.hidden) {
          // 页面不可见，停止计时并上报
          console.log('[埋点] visibilitychange - 页面隐藏')
          reportStayTime('visibilitychange')
        } else {
          // 页面可见，开始新的计时
          console.log('[埋点] visibilitychange - 页面显示，开始新的计时')
          startTimer()
        }
      }

      function handleBlur() {
        // 窗口失去焦点，停止计时并上报
        console.log('[埋点] blur - 窗口失去焦点')
        reportStayTime('blur')
      }

      function handleFocus() {
        // 窗口获得焦点，开始新的计时
        console.log('[埋点] focus - 窗口获得焦点，开始新的计时')
        startTimer()
      }

      function handleBeforeUnload() {
        // 页面卸载前立即上报（不使用防抖）
        console.log('[埋点] beforeunload - 页面即将卸载')
        reportStayTime('beforeunload', true)
        cleanup()
      }

      function handlePageHide() {
        // 页面隐藏时立即上报（iOS Safari 更可靠，不使用防抖）
        console.log('[埋点] pagehide - 页面隐藏')
        reportStayTime('pagehide', true)
      }

      function handleDOMContentLoaded() {
        if (isPageVisible()) {
          startTimer()
        }
      }

      // 监听页面可见性变化
      document.addEventListener('visibilitychange', handleVisibilityChange)

      // 监听窗口失去/获得焦点
      window.addEventListener('blur', handleBlur)
      window.addEventListener('focus', handleFocus)

      // 页面加载完成后开始计时
      if (document.readyState === 'loading') {
        window.addEventListener('DOMContentLoaded', handleDOMContentLoaded)
      } else {
        if (isPageVisible()) {
          startTimer()
        }
      }

      // 页面卸载时上报
      window.addEventListener('beforeunload', handleBeforeUnload)

      // 兼容性：监听 pagehide 事件（iOS Safari 更可靠）
      window.addEventListener('pagehide', handlePageHide)
    })()

    /**
     * 点击飞象老师 Logo 的埋点
     */
    function trackLogoClick(event) {
      // 阻止事件冒泡，避免触发 HTML 点击埋点
      event.stopPropagation()

      if (window.frog) {
        const serverData = window.__SERVER_DATA__ || {}
        const chatId = serverData.watermarkChatId
        console.log('trackHtmlClick', chatId)

        window.frog.add({
          url: '/click/HtmlPage/logo',
          eventId: 42816,
          customExtend: {
            chat_id: chatId,
          },
          currentPage: 'HtmlPage',
          eventAction: 'click',
          eventName: 'logo'
        })

        console.log('[埋点] 点击飞象老师 Logo')
      }
    }

    /**
     * 点击立即体验的埋点
     */
    function trackStartButtonClick(event) {
      // 阻止事件冒泡，避免触发 HTML 点击埋点
      event.stopPropagation()

      if (window.frog) {
        const serverData = window.__SERVER_DATA__ || {}
        const chatId = serverData.watermarkChatId
        console.log('trackHtmlClick', chatId)
        window.frog.add({
          url: '/click/HtmlPage/start',
          eventId: 42817,
          customExtend: {
            chat_id: chatId
          },
          currentPage: 'HtmlPage',
          eventAction: 'click',
          eventName: 'start'
        })
        console.log('[埋点] 点击立即体验')
      }
    }

    // 绑定点击事件
    document.addEventListener('DOMContentLoaded', function () {
      // 绑定 Logo 点击埋点和跳转功能
      const logoElement = document.querySelector('.left-watermark-content')
      if (logoElement) {
        logoElement.addEventListener('click', function (event) {
          trackLogoClick(event)
          openFeixiangTeacher(event)
        })
      }

      // 绑定立即体验按钮点击埋点和跳转功能
      const startButton = document.querySelector('.jump-button')
      if (startButton) {
        startButton.addEventListener('click', function (event) {
          trackStartButtonClick(event)
          openFeixiangTeacher(event)
        })
      }

      // 绑定水印覆盖层点击（整体区域）
      const watermarkOverlay = document.querySelector('.watermark-overlay')
      if (watermarkOverlay) {
        watermarkOverlay.addEventListener('click', function (event) {
          // 如果点击的不是 logo 或按钮，则触发跳转
          const target = event.target
          const isLogo = target.closest('.left-watermark-content')
          const isButton = target.closest('.jump-button')

          if (!isLogo && !isButton) {
            openFeixiangTeacher(event)
          }
        })
      }
    })

    // ==================== 原有功能代码 ====================

    function adjustRem() {
      const pcBaseWidth = 375 // 设计稿
      const width = document.documentElement.clientWidth
      document.documentElement.style.fontSize = `${(width / pcBaseWidth * 100).toFixed(2)}px`
    }


    // 移动端检测和按钮隐藏逻辑
    function checkAndHideButtonOnMobile() {
      const isMobile = getIsMobile()
      if (isMobile) {
        adjustRem()
      }
      const jumpButton = document.querySelector('.right-watermark-content .jump-button');
      const iframeContainer = document.querySelector('.iframe-container');

      if (isMobile && jumpButton) {
        jumpButton.style.display = 'none';
      } else {
        jumpButton.style.display = 'flex'
      }

      // 移动端时给iframe-container添加类名，否则移除类名
      if (iframeContainer) {
        if (isMobile) {
          iframeContainer.classList.add('mobile');
        } else {
          iframeContainer.classList.remove('mobile');
        }
      }
    }


    function handleResize() {
      // 响应式处理：重新检测移动端并处理按钮显示/隐藏
      checkAndHideButtonOnMobile();

      // 在窗口大小变化时，重新应用移动端相关的逻辑
      const isMobile = getIsMobile()
      const watermarkOverlay = document.querySelector('.watermark-overlay');
      const iframeContainer = document.querySelector('.iframe-container');

      // 根据当前设备类型调整水印覆盖层的点击行为
      if (watermarkOverlay) {
        if (isMobile) {
          // 移动端：移除点击事件或设置为空函数
          watermarkOverlay.onclick = function () {
            // 移动端不执行跳转
            return;
          };
        } else {
          // 桌面端：恢复正常的点击跳转功能
          watermarkOverlay.onclick = openFeixiangTeacher;
        }
      }

      // 确保在resize时也能正确添加或移除mobile类
      if (iframeContainer) {
        if (isMobile) {
          iframeContainer.classList.add('mobile');
        } else {
          iframeContainer.classList.remove('mobile');
        }
      }
    }

    // 防止iframe内容溢出
    window.addEventListener('resize', handleResize);

    // 页面加载完成后执行移动端检测
    document.addEventListener('DOMContentLoaded', checkAndHideButtonOnMobile);

    // 清理所有事件绑定的函数
    function clearAllEvents() {
      // 清除 resize 事件监听器
      window.removeEventListener('resize', handleResize);

      // 清除 DOMContentLoaded 事件监听器
      document.removeEventListener('DOMContentLoaded', checkAndHideButtonOnMobile);
    }

    // 页面卸载时自动清理事件（可选）
    window.addEventListener('beforeunload', clearAllEvents);

  </script>
